services:
  - type: web
    name: contenido-rapido-api-staging
    runtime: node
    rootDir: backend
    plan: free
    region: ohio
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npx prisma db seed && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 10000
      - key: UPLOAD_DIR
        value: uploads
      - key: CORS_ORIGIN
        value: https://contenido-rapido-web-staging.onrender.com
      - key: APP_BASE_URL
        value: https://contenido-rapido-api-staging.onrender.com
      - key: FRONTEND_APP_URL
        value: https://contenido-rapido-web-staging.onrender.com
      - key: VIDEO_PROVIDER
        value: mock
      - key: VIDEO_AUTO_GENERATE_ON_APPROVAL
        value: "false"
      - key: VIDEO_SYNC_MIN_AGE_MS
        value: 5000
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VIDEO_MODEL
        value: sora-2
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        value: https://contenido-rapido-api-staging.onrender.com/api/social-connections/oauth/linkedin/callback
      - key: LINKEDIN_API_VERSION
        value: "202602"
      - key: LINKEDIN_SCOPES
        value: openid,profile,email,w_member_social,w_organization_social,rw_organization_admin
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_REDIRECT_URI
        value: https://contenido-rapido-api-staging.onrender.com/api/social-connections/oauth/facebook/callback
      - key: FACEBOOK_GRAPH_VERSION
        value: v23.0
      - key: FACEBOOK_SCOPES
        value: pages_show_list,pages_read_engagement,pages_manage_posts,pages_manage_metadata,publish_video

  - type: web
    name: contenido-rapido-web-staging
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://contenido-rapido-api-staging.onrender.com/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY
        sync: false
